<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Account</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F6FA;--surface:#fff;--surface2:#F0F3F8;--border:#E2E8F0;
  --text:#0D1829;--text2:#4A5568;--text3:#8A9AB0;
  --blue:#1A56DB;--green:#059669;--red:#DC2626;--navy:#0D1829;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --sh:0 1px 3px rgba(0,0,0,.07);--r:10px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:216px;min-width:216px;background:var(--navy);height:100vh;position:sticky;top:0;display:flex;flex-direction:column}
.logo-area{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo-mark{font-family:var(--mono);font-size:17px;font-weight:500;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section{margin-bottom:18px}
.nav-section-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:0 8px 5px}
.nav-item{text-decoration:none;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(26,86,219,.3);color:#fff}
.nav-ic{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-ic{opacity:1}
.sidebar-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.35)}
.sidebar-foot strong{color:rgba(255,255,255,.6);display:block;margin-top:2px;font-size:12px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.topbar-title{font-size:15px;font-weight:700}
.content{padding:28px 24px;flex:1;max-width:820px}

.btn{height:36px;padding:0 16px;border-radius:7px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1245B8}
.btn-outline{background:var(--surface);color:var(--text2);border:1px solid var(--border)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#B91C1C}

/* Sections */
.account-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.section-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:14px;font-weight:700}
.section-sub{font-size:12px;color:var(--text3);margin-top:2px}
.section-body{padding:22px}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.form-full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
.field input,.field select,.field textarea{height:38px;padding:0 12px;border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field input:disabled{background:var(--surface2);color:var(--text3)}
.field textarea{height:72px;padding:10px 12px;resize:none}
.field .hint{font-size:11px;color:var(--text3)}

/* Logo upload */
.logo-upload-area{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.logo-upload-area:hover{border-color:var(--blue);background:#EEF4FF}
.logo-upload-area.has-logo{border-style:solid;border-color:var(--green);background:#ECFDF5}
.logo-preview{max-height:60px;max-width:200px;object-fit:contain;margin-bottom:8px}
.logo-upload-label{font-size:12px;color:var(--text3)}
.logo-upload-label strong{color:var(--blue);cursor:pointer}

/* Info card */
.info-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.info-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.info-text{font-size:12px;color:var(--text2);line-height:1.5}

/* Password section */
.pass-row{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}

/* Org ID display */
.org-id-display{font-family:var(--mono);font-size:12px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.copy-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:600;padding:0}

/* Status badge */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.status-active{background:#ECFDF5;color:#065F46}
.status-inactive{background:#FEF2F2;color:#991B1B}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0D1829;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo-area">
    <div class="logo-mark">NEXUS</div>
    <div class="logo-sub" id="sidebar-org-name">Loading…</div>
  </div>
  <nav class="nav">
    <div class="nav-section">
      <div class="nav-section-label">Operations</div>
      <a class="nav-item" href="nexus-tms-settlement-v3.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V3a1 1 0 00-1-1z"/><path d="M5 6h6M5 9h6M5 12h3"/></svg>Settlements
      </a>
      <a class="nav-item" href="nexus-tms-history.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2 2"/></svg>History
      </a>
      <a class="nav-item" href="nexus-tms-street-loads.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 11l4-7 3 5 2-3 3 5"/></svg>Street Loads
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Analytics</div>
      <a class="nav-item" href="nexus-tms-pnl.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l3-4 3 2 3-5 3 3"/><path d="M2 14h12"/></svg>P&amp;L
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Management</div>
      <a class="nav-item" href="nexus-tms-equipment-5.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="9" width="5" height="6" rx="1"/><rect x="10" y="9" width="5" height="6" rx="1"/><path d="M3.5 9V7a1 1 0 011-1h7a1 1 0 011 1v2"/><path d="M8 6V2"/></svg>Equipment
      </a>
      <a class="nav-item" href="nexus-tms-drivers-5.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>Drivers
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Settings</div>
      <a class="nav-item active" href="nexus-account.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/><path d="M11 3l1 1M13 5h1M11 7l1 1M5 3l-1 1M3 5H2M5 7l-1 1"/></svg>Account
      </a>
    </div>
  </nav>
  <div class="sidebar-foot">NEXUS<strong>v1.0 · Account</strong></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Account Settings</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="status-badge status-active" id="org-status-badge">● Active</span>
      <span style="font-size:12px;color:var(--text3)" id="topbar-org-name">—</span>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div> Loading account…</div>
  </div>
</div>

<div class="toast" id="toast-el"></div>

<script>
const SUPABASE_URL = 'https://aiokbuzauuadoqrghyic.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpb2tidXphdXVhZG9xcmdoeWljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjM1NDcsImV4cCI6MjA4ODg5OTU0N30.KzHNFWN2kDbNSHB0Tj-zQGrYNNR_tDDJ_P8INW5kjeU';
const PASS = 'zta2026';

// Determine org_id — from sessionStorage (if entered via admin) or hardcoded fallback
const ORG_ID = sessionStorage.getItem('nexus-org-id') || '27fbeaa2-60d7-4059-9522-d6f5c291adaa';

const $ = id => document.getElementById(id);
let toastT, currentOrg = null;

function toast(msg, err) {
  const el = $('toast-el');
  el.textContent = msg;
  el.style.background = err ? 'var(--red)' : '#059669';
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── AUTH ──────────────────────────────────────────────────────────────
(function auth() {
  const stored = sessionStorage.getItem('nxauth');
  // Also allow admin session
  const isAdmin = sessionStorage.getItem('nexus-admin') === '1';
  if (!isAdmin && stored !== PASS) {
    const p = prompt('Access code:');
    if (!p) { location.href = 'nexus-tms-settlement-v3.html'; return; }
    sessionStorage.setItem('nxauth', p);
  }
})();

async function sbFetch(table, query) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbPatch(table, query, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=minimal'
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
}

// ── LOAD ──────────────────────────────────────────────────────────────
async function loadAccount() {
  try {
    const orgs = await sbFetch('organizations', `id=eq.${ORG_ID}&select=*`);
    if (!orgs.length) { $('content').innerHTML = '<div class="loading">Organization not found</div>'; return; }
    currentOrg = orgs[0];
    $('sidebar-org-name').textContent = currentOrg.name;
    $('topbar-org-name').textContent  = currentOrg.name;
    const badge = $('org-status-badge');
    badge.textContent = currentOrg.active ? '● Active' : '○ Inactive';
    badge.className   = 'status-badge ' + (currentOrg.active ? 'status-active' : 'status-inactive');
    renderAccount(currentOrg);
  } catch(e) {
    toast('Error: ' + e.message, true);
  }
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderAccount(org) {
  $('content').innerHTML = `

    <!-- Company Info -->
    <div class="account-section">
      <div class="section-head">
        <div>
          <div class="section-title">Company Information</div>
          <div class="section-sub">Appears on settlements and PDF statements</div>
        </div>
      </div>
      <div class="section-body">
        <div class="form-grid" style="margin-bottom:16px">
          <div class="field form-full">
            <label>Company Name *</label>
            <input type="text" id="f-name" value="${esc(org.name)}">
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="f-email" value="${esc(org.email)}">
          </div>
          <div class="field">
            <label>Phone</label>
            <input type="text" id="f-phone" value="${esc(org.phone)}">
          </div>
          <div class="field form-full">
            <label>Address</label>
            <input type="text" id="f-address" value="${esc(org.address)}">
            <div class="hint">Full address as it appears on statements</div>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end">
          <button class="btn btn-primary" onclick="saveCompanyInfo()">
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 16 16" stroke-width="2"><path d="M2 8l4 4 8-8"/></svg>
            Save Changes
          </button>
        </div>
      </div>
    </div>

    <!-- Statement Settings -->
    <div class="account-section">
      <div class="section-head">
        <div>
          <div class="section-title">Statement Settings</div>
          <div class="section-sub">Default values used when generating settlements</div>
        </div>
      </div>
      <div class="section-body">
        <div class="form-grid-3" style="margin-bottom:16px">
          <div class="field">
            <label>Default Dispatch %</label>
            <input type="number" id="f-dispatch-pct" value="3" step="0.5" min="0" max="20">
            <div class="hint">Applied to gross per truck</div>
          </div>
          <div class="field">
            <label>Safety ($/mo)</label>
            <input type="number" id="f-safety" value="100" step="10">
            <div class="hint">Deducted from POO/OO profit</div>
          </div>
          <div class="field">
            <label>Accounting ($/mo)</label>
            <input type="number" id="f-accounting" value="50" step="10">
            <div class="hint">Deducted from POO/OO profit</div>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end">
          <button class="btn btn-primary" onclick="saveStatementSettings()">
            <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 16 16" stroke-width="2"><path d="M2 8l4 4 8-8"/></svg>
            Save Settings
          </button>
        </div>
      </div>
    </div>

    <!-- Access & Security -->
    <div class="account-section">
      <div class="section-head">
        <div>
          <div class="section-title">Access & Security</div>
          <div class="section-sub">Login credentials for your organization</div>
        </div>
      </div>
      <div class="section-body">
        <div class="info-card">
          <div class="info-icon">🔒</div>
          <div class="info-text">This access code is used by all users in your organization to log into NEXUS. Keep it secure and share only with authorized personnel.</div>
        </div>
        <div class="pass-row">
          <div class="field">
            <label>New Access Code</label>
            <input type="password" id="f-pass-new" placeholder="Enter new code">
          </div>
          <div class="field">
            <label>Confirm Code</label>
            <input type="password" id="f-pass-confirm" placeholder="Repeat new code">
          </div>
          <button class="btn btn-outline" onclick="changePassword()">Update Code</button>
        </div>
      </div>
    </div>

    <!-- Organization ID -->
    <div class="account-section">
      <div class="section-head">
        <div>
          <div class="section-title">Organization ID</div>
          <div class="section-sub">Unique identifier for your organization</div>
        </div>
      </div>
      <div class="section-body">
        <div class="org-id-display">
          <span>${org.id}</span>
          <button class="copy-btn" onclick="copyId()">Copy</button>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--text3)">Slug: <span style="font-family:var(--mono)">${org.slug||'—'}</span> · Plan: <span style="font-family:var(--mono);text-transform:uppercase">${org.plan||'free'}</span></div>
      </div>
    </div>

  `;
}

// ── SAVE ──────────────────────────────────────────────────────────────
async function saveCompanyInfo() {
  const name    = $('f-name').value.trim();
  const email   = $('f-email').value.trim();
  const phone   = $('f-phone').value.trim();
  const address = $('f-address').value.trim();
  if (!name) { toast('Company name is required', true); return; }
  try {
    await sbPatch('organizations', `id=eq.${ORG_ID}`, { name, email, phone, address });
    currentOrg = { ...currentOrg, name, email, phone, address };
    $('sidebar-org-name').textContent = name;
    $('topbar-org-name').textContent  = name;
    sessionStorage.setItem('nexus-org-name', name);
    toast('✓ Company information saved');
  } catch(e) { toast('Error: ' + e.message, true); }
}

async function saveStatementSettings() {
  // Store in org settings column if available, else just confirm
  const dispatch   = parseFloat($('f-dispatch-pct').value) || 3;
  const safety     = parseFloat($('f-safety').value) || 100;
  const accounting = parseFloat($('f-accounting').value) || 50;
  try {
    // Save to sessionStorage for use in other pages
    sessionStorage.setItem('nexus-dispatch-pct', dispatch);
    sessionStorage.setItem('nexus-safety', safety);
    sessionStorage.setItem('nexus-accounting', accounting);
    // Try to save to org settings in DB if settings column exists
    await sbPatch('organizations', `id=eq.${ORG_ID}`, {
      settings: { dispatch_pct: dispatch, safety_monthly: safety, accounting_monthly: accounting }
    }).catch(() => {}); // ignore if column doesn't exist yet
    toast('✓ Statement settings saved');
  } catch(e) { toast('Error: ' + e.message, true); }
}

async function changePassword() {
  const np = $('f-pass-new').value;
  const cp = $('f-pass-confirm').value;
  if (!np) { toast('Enter a new access code', true); return; }
  if (np !== cp) { toast('Codes do not match', true); return; }
  if (np.length < 6) { toast('Code must be at least 6 characters', true); return; }
  try {
    await sbPatch('organizations', `id=eq.${ORG_ID}`, { password: np });
    sessionStorage.setItem('nxauth', np);
    $('f-pass-new').value = '';
    $('f-pass-confirm').value = '';
    toast('✓ Access code updated');
  } catch(e) { toast('Error: ' + e.message, true); }
}

function copyId() {
  navigator.clipboard.writeText(ORG_ID).then(() => toast('Org ID copied'));
}

function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── INIT ──────────────────────────────────────────────────────────────
loadAccount();
</script>
</body>
</html>
