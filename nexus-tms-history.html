<html lang="en">
<head>

<title>NEXUS — History</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F6FA;--surface:#fff;--surface2:#F0F3F8;--border:#E2E8F0;
  --text:#0D1829;--text2:#4A5568;--text3:#8A9AB0;
  --blue:#1A56DB;--green:#059669;--red:#DC2626;--navy:#0D1829;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --sh:0 1px 3px rgba(0,0,0,.07);--r:10px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:216px;min-width:216px;background:var(--navy);height:100vh;position:sticky;top:0;display:flex;flex-direction:column}
.logo-area{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo-mark{font-family:var(--mono);font-size:17px;font-weight:500;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section{margin-bottom:18px}
.nav-section-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:0 8px 5px}
.nav-item{text-decoration:none;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(26,86,219,.3);color:#fff}
.nav-ic{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-ic{opacity:1}
.sidebar-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.35)}
.sidebar-foot strong{color:rgba(255,255,255,.6);display:block;margin-top:2px;font-size:12px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.topbar-title{font-size:15px;font-weight:700}
.content{padding:24px;flex:1}
.filters{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.finput{height:34px;padding:0 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);outline:none}
.finput:focus{border-color:var(--blue)}
.fselect{height:34px;padding:0 8px;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);outline:none;cursor:pointer}
.btn{height:34px;padding:0 14px;border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1245B8}
.btn-outline{background:var(--surface);color:var(--text2);border:1px solid var(--border)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.summary-bar{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.sum-stat{flex:1;padding:14px 18px;border-right:1px solid var(--border)}.sum-stat:last-child{border-right:none}
.sum-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:4px}
.sum-val{font-size:20px;font-weight:700}.sum-val.g{color:var(--green)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
th.r,td.r{text-align:right}
td{font-size:13px;padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
.clickable-row{cursor:pointer;transition:background .1s}.clickable-row:hover td{background:#EBF2FF}
.mono{font-family:var(--mono);font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-P{background:#ECFDF5;color:#065F46}.badge-POO{background:#EFF6FF;color:#1E40AF}
.badge-OO{background:#FEF3C7;color:#92400E}.badge-CT{background:#F3E8FF;color:#6B21A8}.badge-Driver{background:#F1F5F9;color:#475569}
.green{color:var(--green);font-weight:600}
.settle-id{font-family:var(--mono);font-size:12px;color:var(--blue);font-weight:600}
.period-cell{font-size:12px;color:var(--text3)}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.modal-box{background:var(--surface);border-radius:12px;width:820px;max-width:95vw;height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:14px;font-weight:700}
.modal-actions{display:flex;gap:8px;align-items:center}
.btn-icon{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.btn-icon:hover{border-color:var(--blue);color:var(--blue)}
.modal-iframe{flex:1;border:none;width:100%}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0D1829;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

    </div>
  </nav>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Settlement History</div>

      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 16 16" stroke-width="1.5"><path d="M2 8a6 6 0 1 0 6-6 6 6 0 0 0-4.5 2"/><path d="M2 4v4h4"/></svg>Refresh

        <option value="">All Types</option>

      </select>

        <button class="btn btn-primary" id="stmt-print-btn">

<script>
const SUPABASE_URL='https://aiokbuzauuadoqrghyic.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpb2tidXphdXVhZG9xcmdoeWljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjM1NDcsImV4cCI6MjA4ODg5OTU0N30.KzHNFWN2kDbNSHB0Tj-zQGrYNNR_tDDJ_P8INW5kjeU';
const ORG_ID='27fbeaa2-60d7-4059-9522-d6f5c291adaa';
let allRows=[],visibleRows=[];

async function sbFetch(t,p=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?${p}`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
  if(!r.ok)throw new Error(`${t}: ${r.status}`);
  return r.json();
}
function fmt(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${m}/${day}/${y}`}
function toast(msg){const e=document.getElementById('toast-el');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000)}
function fc(s){if(!s)return'—';const p=String(s).split(',');return p[0].trim()+(p[1]?', '+p[1].trim():'')}

async function loadHistory(){
  document.getElementById('table-body').innerHTML='<div class="loading"><div class="spinner"></div> Loading…</div>';
  try{
    const rows=await sbFetch('settlements',`org_id=eq.${ORG_ID}&order=created_at.desc&limit=500&select=*`);
    allRows=rows;
    populateFilters(rows);
    renderTable(rows);
  }catch(e){
    document.getElementById('table-body').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load</div><p>${e.message}</p></div>`;
  }
}

function populateFilters(rows){
  const drivers=[...new Set(rows.map(r=>r.driver_name).filter(Boolean))].sort();
  const trucks=[...new Set(rows.map(r=>r.truck_unit).filter(Boolean))].sort();
  document.getElementById('f-driver').innerHTML='<option value="">All Drivers</option>'+drivers.map(d=>`<option value="${d}">${d}</option>`).join('');
  document.getElementById('f-truck').innerHTML='<option value="">All Trucks</option>'+trucks.map(t=>`<option value="${t}">Unit ${t}</option>`).join('');
}

function applyFilters(){
  const from=document.getElementById('f-from').value,to=document.getElementById('f-to').value;
  const driver=document.getElementById('f-driver').value,truck=document.getElementById('f-truck').value,type=document.getElementById('f-type').value;
  let f=allRows;
  if(from)f=f.filter(r=>r.week_start>=from);
  if(to)f=f.filter(r=>r.week_end<=to);
  if(driver)f=f.filter(r=>r.driver_name===driver);
  if(truck)f=f.filter(r=>r.truck_unit===truck);
  if(type)f=f.filter(r=>r.driver_type===type);
  renderTable(f);
}

function clearFilters(){
  ['f-from','f-to'].forEach(id=>document.getElementById(id).value='');
  ['f-driver','f-truck','f-type'].forEach(id=>document.getElementById(id).value='');
  renderTable(allRows);
}

const TYPE_LABELS={P:'Partner',POO:'Partner OO',OO:'Owner-Op',CT:'Company Truck',Driver:'Driver'};

function renderTable(rows){
  visibleRows=rows;
  const tG=rows.reduce((a,r)=>a+Number(r.gross||0),0);
  const tN=rows.reduce((a,r)=>a+Number(r.net_pay||0),0);
  document.getElementById('summary-wrap').innerHTML=rows.length?`
    <div class="summary-bar">
      <div class="sum-stat"><div class="sum-label">Statements</div><div class="sum-val">${rows.length}</div></div>
      <div class="sum-stat"><div class="sum-label">Total Gross</div><div class="sum-val g">$${fmt(tG)}</div></div>
      <div class="sum-stat"><div class="sum-label">Total Net</div><div class="sum-val">$${fmt(tN)}</div></div>
      <div class="sum-stat"><div class="sum-label">Avg Net</div><div class="sum-val">$${fmt(rows.length?tN/rows.length:0)}</div></div>
    </div>`:'';
  if(!rows.length){
    document.getElementById('table-body').innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No statements found</div><p>Generate settlements to see history here</p></div>';
    return;
  }
  const tbody=rows.map((r,i)=>`
    <tr class="clickable-row" onclick="openStatement(${i})">
      <td><span class="settle-id">#${r.settle_id||'—'}</span></td>
      <td class="period-cell">${fmtDate(r.week_start)} — ${fmtDate(r.week_end)}</td>
      <td><strong>${r.driver_name||'—'}</strong></td>
      <td class="mono">${r.truck_unit||'—'}</td>
      <td><span class="badge badge-${r.driver_type}">${TYPE_LABELS[r.driver_type]||r.driver_type||'—'}</span></td>
      <td class="r mono">$${fmt(r.gross)}</td>
      <td class="r mono" style="color:var(--red)">−$${fmt(r.deductions_total)}</td>
      <td class="r mono green">$${fmt(r.net_pay)}</td>
      <td class="period-cell">${r.loads_count||0} loads &rsaquo;</td>
    </tr>`).join('');
  document.getElementById('table-body').innerHTML=`
    <table>
      <thead><tr><th>ID</th><th>Period</th><th>Driver</th><th>Unit</th><th>Type</th><th class="r">Gross</th><th class="r">Deductions</th><th class="r">Net Pay</th><th>Loads</th></tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;
}

function openStatement(idx){
  const r=visibleRows[idx];
  if(!r)return;
  const lastName=(r.driver_name||'Driver').split(' ').pop();
  document.getElementById('modal-title').textContent=`Settlement #${r.settle_id||'—'} · ${r.driver_name||'—'}`;
  document.getElementById('stmt-iframe').srcdoc=buildStatementHTML(r);
  document.getElementById('stmt-print-btn').onclick=()=>{
    const iw=document.getElementById('stmt-iframe').contentWindow;
    iw.document.title=`${r.settle_id||'0000'}-${lastName}`;
    iw.print();
  };
  document.getElementById('stmt-modal').style.display='flex';
}

function closeModal(){document.getElementById('stmt-modal').style.display='none';}

function buildStatementHTML(r){
  const TYPE_FULL={P:'Partner',POO:'Partner OO',OO:'Owner-Op',CT:'Company Truck',Driver:'Driver'};
  const dTypeLabel=TYPE_FULL[r.driver_type]||r.driver_type||'—';
  const ded=r.deductions||{};
  const adjs=(r.manual_adjustments||[]).filter(Boolean);
  const period=fmtDate(r.week_start)+' — '+fmtDate(r.week_end);
  const DR=(label,amt)=>amt>0?`<tr><td class="dl">${label}</td><td class="dv red">− $${fmt(amt)}</td></tr>`:'';
  const adjRows=adjs.map(x=>`<tr><td class="dl">${x.label||'Adjustment'}</td><td class="dv ${x.amt>=0?'grn':'red'}">${x.amt>=0?'+':'-'} $${fmt(Math.abs(x.amt))}</td></tr>`).join('');
  const loads=r.loads||[];
  const totalMiles=loads.reduce((a,l)=>a+(l.miles||0),0);
  const loadsRows=loads.length
    ?loads.map(l=>`<tr>
        <td style="color:#64748B;font-family:monospace;font-size:10px">${l.id||''}${l.type==='tour'?` <span style="color:#1A56DB;font-weight:700">Tour×${l.legs_count||''}</span>`:''}</td>
        <td style="color:#94A3B8">${l.date||''}</td>
        <td>${fc(l.origin)} → ${fc(l.destination)}</td>
        <td style="text-align:right;color:#64748B">${Math.round(l.miles||0).toLocaleString()}</td>
        <td style="text-align:right;font-weight:700;color:#059669">$${fmt(l.gross)}</td>
      </tr>`).join('')
    :`<tr><td colspan="5" style="text-align:center;color:#94A3B8;padding:16px;font-style:italic">Load detail not available — re-generate to include</td></tr>`;

  return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>

.header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:18px;border-bottom:3px solid #0D1829;margin-bottom:24px}
.header-left{flex:1}.header-right{text-align:right;min-width:190px}
.co-name{font-size:13px;font-weight:700;margin-bottom:5px}
.co-info{font-size:13px;color:#64748B;line-height:1.8}
.doc-label{font-size:26px;font-weight:800;letter-spacing:-0.5px;line-height:1}
.doc-period{font-size:13px;color:#64748B;margin-top:4px}
.info-block{margin-top:14px}.info-row{display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid #F1F5F9}
.info-lbl{font-size:13px;color:#94A3B8;min-width:72px}.info-val{font-size:13px;font-weight:600}
.badge{padding:2px 9px;border-radius:20px;font-size:13px;font-weight:600;background:#E0E7FF;color:#3730A3}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94A3B8;margin:20px 0 8px;padding-bottom:4px;border-bottom:1px solid #E2E8F0}
table{width:100%;border-collapse:collapse}
.loads-tbl th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#94A3B8;padding:4px 8px;background:#F8F9FA;border-bottom:1px solid #E2E8F0;text-align:left}
.loads-tbl th:last-child,.loads-tbl td:last-child,.loads-tbl th:nth-child(4),.loads-tbl td:nth-child(4){text-align:right}
.loads-tbl td{font-size:11px;padding:5px 8px;border-bottom:1px solid #F1F5F9}
.loads-tbl tr:last-child td{background:#F4F6FA;font-weight:700;border-bottom:none}
.ded-tbl{width:100%;border-collapse:collapse;margin-bottom:4px}
.ded-tbl td{font-size:13px;padding:5px 0;border-bottom:1px solid #F8F9FA}
.dl{color:#4A5568}.dv{text-align:right;font-weight:600}.red{color:#DC2626}.grn{color:#059669}
.gross-row td{font-weight:700;border-bottom:2px solid #E2E8F0;padding-bottom:8px}
.net-row{margin-top:14px;padding:14px 0;border-top:3px solid #0D1829;display:flex;justify-content:space-between;align-items:center}
.net-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.net-val{font-size:26px;font-weight:800;color:#059669}
.footer{margin-top:24px;padding-top:10px;border-top:1px solid #E2E8F0;display:flex;justify-content:space-between;font-size:11px;color:#94A3B8}
@media print{body{padding:18px}}
</style></head><body>
<div class="header">
  <div class="header-left">
    <div class="doc-label">SETTLEMENT <span style="font-size:18px;color:#1A56DB">#${r.settle_id||'—'}</span></div>
    <div class="doc-period">${period}</div>
    <div class="info-block">
      <div class="info-row"><span class="info-lbl">Unit</span><span class="info-val">${r.truck_unit||'—'}</span></div>
      <div class="info-row"><span class="info-lbl">Driver</span><span class="info-val">${r.driver_name||'—'}</span></div>
      <div class="info-row"><span class="info-lbl">Status</span><span class="info-val"><span class="badge">${dTypeLabel}${r.driver_pay_pct&&r.driver_pay_pct!==100?' · '+r.driver_pay_pct+'%':''}</span></span></div>
    </div>
  </div>
  <div class="header-right">
    <div class="co-name">ZTA Transportation LLC</div>
    <div class="co-info">2100 Grant Ave, Apt 10<br>Philadelphia, PA 19115<br>272-372-0000<br>info@ztatrans.com</div>
  </div>
</div>
<div class="sec-title">Loads</div>
<table class="loads-tbl">
  <thead><tr><th>ID / Trip</th><th>Date</th><th>Route</th><th>Miles</th><th>Gross</th></tr></thead>
  <tbody>
    ${loadsRows}
    <tr><td colspan="3"><strong>Total</strong></td><td>${Math.round(totalMiles).toLocaleString()}</td><td>$${fmt(r.gross)}</td></tr>
  </tbody>
</table>
<div class="sec-title">Deductions</div>
<table class="ded-tbl">
  <tr class="gross-row"><td class="dl">Gross Revenue</td><td class="dv">$${fmt(r.gross)}</td></tr>
  ${DR('Company Cut',ded.company_cut||0)}
  ${DR('Dispatch Fee ('+(r.dispatch_pct||0)+'%)',r.dispatch_amt||0)}
  ${DR('Insurance',ded.insurance||0)}
  ${DR('Physical Damage',ded.physdmg||0)}
  ${DR('IFTA',ded.ifta||0)}
  ${DR('Admin',ded.admin||0)}
  ${DR('Trailer Rent',ded.trailerrent||0)}
  ${DR('Samsara',ded.samsara||0)}
  ${DR('EZ Pass',ded.ezpass||0)}
  ${DR('Fuel Card',ded.fuel||0)}
  ${DR('PrePass',ded.prepass||0)}
  ${DR('Tablet',ded.tablet||0)}
  ${DR('Truck Payment',ded.truck_payment||0)}
  ${DR('Driver Pay ('+(r.driver_pay_pct||0)+'%)',ded.driver_pay||0)}
  ${adjRows}
</table>
<div class="net-row">
  <span class="net-label">Net Pay</span>
  <span class="net-val">$${fmt(r.net_pay)}</span>
</div>
<div class="footer">
  <span>Generated by NEXUS · ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
  <span style="font-family:monospace;font-size:10px;color:#CBD5E1">${r.invoice_id||''}</span>
</div>
</body></html>`;

d30.setDate(d30.getDate()-30);
document.getElementById('f-from').value=d30.toISOString().slice(0,10);
document.getElementById('f-to').value=today.toISOString().slice(0,10);
loadHistory();
