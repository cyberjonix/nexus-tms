<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — History</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F6FA;--surface:#fff;--surface2:#F0F3F8;--border:#E2E8F0;
  --text:#0D1829;--text2:#4A5568;--text3:#8A9AB0;
  --blue:#1A56DB;--blue-l:#EBF2FF;
  --green:#059669;--green-l:#ECFDF5;
  --red:#DC2626;--red-l:#FEF2F2;
  --navy:#0D1829;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --sh:0 1px 3px rgba(0,0,0,.07);--r:10px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* SIDEBAR */
.sidebar{width:216px;min-width:216px;background:var(--navy);height:100vh;position:sticky;top:0;display:flex;flex-direction:column}
.logo-area{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo-mark{font-family:var(--mono);font-size:17px;font-weight:500;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section{margin-bottom:18px}
.nav-section-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:0 8px 5px}
.nav-item{text-decoration:none;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(26,86,219,.3);color:#fff}
.nav-ic{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-ic{opacity:1}
.sidebar-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.35)}
.sidebar-foot strong{color:rgba(255,255,255,.6);display:block;margin-top:2px;font-size:12px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.topbar-title{font-size:15px;font-weight:700}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{padding:24px;flex:1}

/* FILTERS */
.filters{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.finput{height:34px;padding:0 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);outline:none}
.finput:focus{border-color:var(--blue)}
.fselect{height:34px;padding:0 8px;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);outline:none;cursor:pointer}
.btn{height:34px;padding:0 14px;border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1245B8}
.btn-outline{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}

/* SUMMARY */
.summary-bar{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.sum-stat{flex:1;padding:14px 18px;border-right:1px solid var(--border)}
.sum-stat:last-child{border-right:none}
.sum-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:4px}
.sum-val{font-size:20px;font-weight:700;color:var(--text)}
.sum-val.g{color:var(--green)}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
th.r,td.r{text-align:right}
td{font-size:13px;padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFD}
.mono{font-family:var(--mono);font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-P{background:#ECFDF5;color:#065F46}
.badge-POO{background:#EFF6FF;color:#1E40AF}
.badge-OO{background:#FEF3C7;color:#92400E}
.badge-CT{background:#F3E8FF;color:#6B21A8}
.badge-Driver{background:#F1F5F9;color:#475569}
.green{color:var(--green);font-weight:600}
.settle-id{font-family:var(--mono);font-size:12px;color:var(--blue);font-weight:600}
.period-cell{font-size:12px;color:var(--text3)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0D1829;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo-area">
    <div class="logo-mark">NEXUS</div>
    <div class="logo-sub">ZTA Transportation LLC</div>
  </div>
  <nav class="nav">
    <div class="nav-section">
      <div class="nav-section-label">Operations</div>
      <a class="nav-item" href="nexus-tms-settlement-v3.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V3a1 1 0 00-1-1z"/><path d="M5 6h6M5 9h6M5 12h3"/></svg>Settlements
      </a>
      <a class="nav-item active" href="nexus-tms-history.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2 2"/></svg>History
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Management</div>
      <a class="nav-item" href="nexus-tms-equipment-5.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="9" width="5" height="6" rx="1"/><rect x="10" y="9" width="5" height="6" rx="1"/><path d="M3.5 9V7a1 1 0 011-1h7a1 1 0 011 1v2"/><path d="M8 6V2"/></svg>Equipment
      </a>
      <a class="nav-item" href="nexus-tms-drivers-5.html">
        <svg class="nav-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>Drivers
      </a>
    </div>
  </nav>
  <div class="sidebar-foot">NEXUS<strong>v1.0 &middot; History</strong></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Settlement History</div>
    <div class="topbar-actions">
      <button class="btn btn-outline" onclick="loadHistory()">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 16 16" stroke-width="1.5"><path d="M2 8a6 6 0 1 0 6-6 6 6 0 0 0-4.5 2"/><path d="M2 4v4h4"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="content">
    <!-- FILTERS -->
    <div class="filters">
      <input type="date" class="finput" id="f-from" placeholder="From">
      <span style="color:var(--text3);font-size:13px">→</span>
      <input type="date" class="finput" id="f-to" placeholder="To">
      <select class="fselect" id="f-driver">
        <option value="">All Drivers</option>
      </select>
      <select class="fselect" id="f-truck">
        <option value="">All Trucks</option>
      </select>
      <select class="fselect" id="f-type">
        <option value="">All Types</option>
        <option value="P">Partner</option>
        <option value="POO">Partner OO</option>
        <option value="OO">Owner-Op</option>
        <option value="CT">Company Truck</option>
      </select>
      <button class="btn btn-primary" onclick="applyFilters()">Filter</button>
      <button class="btn btn-outline" onclick="clearFilters()">Clear</button>
    </div>

    <!-- SUMMARY -->
    <div id="summary-wrap"></div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div id="table-body"><div class="loading"><div class="spinner"></div> Loading history…</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast-el"></div>

<script>
const SUPABASE_URL = 'https://aiokbuzauuadoqrghyic.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpb2tidXphdXVhZG9xcmdoeWljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjM1NDcsImV4cCI6MjA4ODg5OTU0N30.KzHNFWN2kDbNSHB0Tj-zQGrYNNR_tDDJ_P8INW5kjeU';
const ORG_ID       = '27fbeaa2-60d7-4059-9522-d6f5c291adaa';

let allRows = [];

async function sbFetch(table, params='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  if (!r.ok) throw new Error(`${table}: ${r.status}`);
  return r.json();
}

function fmt(n) { return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y}`;
}
function toast(msg) {
  const el = document.getElementById('toast-el');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function loadHistory() {
  document.getElementById('table-body').innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  try {
    const rows = await sbFetch('settlements',
      `org_id=eq.${ORG_ID}&order=created_at.desc&limit=200&select=*`
    );
    allRows = rows;
    populateFilters(rows);
    renderTable(rows);
  } catch(e) {
    document.getElementById('table-body').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load</div><p>${e.message}</p></div>`;
  }
}

function populateFilters(rows) {
  const drivers = [...new Set(rows.map(r => r.driver_name).filter(Boolean))].sort();
  const trucks  = [...new Set(rows.map(r => r.truck_unit).filter(Boolean))].sort();

  const dSel = document.getElementById('f-driver');
  dSel.innerHTML = '<option value="">All Drivers</option>' +
    drivers.map(d => `<option value="${d}">${d}</option>`).join('');

  const tSel = document.getElementById('f-truck');
  tSel.innerHTML = '<option value="">All Trucks</option>' +
    trucks.map(t => `<option value="${t}">Unit ${t}</option>`).join('');
}

function applyFilters() {
  const from   = document.getElementById('f-from').value;
  const to     = document.getElementById('f-to').value;
  const driver = document.getElementById('f-driver').value;
  const truck  = document.getElementById('f-truck').value;
  const type   = document.getElementById('f-type').value;

  let filtered = allRows;
  if (from)   filtered = filtered.filter(r => r.week_start >= from);
  if (to)     filtered = filtered.filter(r => r.week_end <= to);
  if (driver) filtered = filtered.filter(r => r.driver_name === driver);
  if (truck)  filtered = filtered.filter(r => r.truck_unit === truck);
  if (type)   filtered = filtered.filter(r => r.driver_type === type);

  renderTable(filtered);
}

function clearFilters() {
  ['f-from','f-to'].forEach(id => document.getElementById(id).value = '');
  ['f-driver','f-truck','f-type'].forEach(id => document.getElementById(id).value = '');
  renderTable(allRows);
}

const TYPE_LABELS = {P:'Partner',POO:'Partner OO',OO:'Owner-Op',CT:'Company Truck',Driver:'Driver'};

function renderTable(rows) {
  // Summary
  const totalGross = rows.reduce((a,r) => a + Number(r.gross||0), 0);
  const totalNet   = rows.reduce((a,r) => a + Number(r.net_pay||0), 0);
  document.getElementById('summary-wrap').innerHTML = rows.length ? `
    <div class="summary-bar">
      <div class="sum-stat"><div class="sum-label">Statements</div><div class="sum-val">${rows.length}</div></div>
      <div class="sum-stat"><div class="sum-label">Total Gross</div><div class="sum-val g">$${fmt(totalGross)}</div></div>
      <div class="sum-stat"><div class="sum-label">Total Net</div><div class="sum-val">$${fmt(totalNet)}</div></div>
      <div class="sum-stat"><div class="sum-label">Avg Net / Statement</div><div class="sum-val">$${fmt(rows.length ? totalNet/rows.length : 0)}</div></div>
    </div>` : '';

  if (!rows.length) {
    document.getElementById('table-body').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No statements found</div>
        <p>Generate settlements to see history here</p>
      </div>`;
    return;
  }

  const rowsHtml = rows.map(r => {
    const typeLabel = TYPE_LABELS[r.driver_type] || r.driver_type || '—';
    const deductions = r.deductions || {};
    const dedList = Object.entries(deductions)
      .filter(([,v]) => Number(v) > 0)
      .map(([k,v]) => `${k}: $${fmt(v)}`).join(' · ');

    return `<tr>
      <td><span class="settle-id">#${r.settle_id || '—'}</span></td>
      <td class="period-cell">${fmtDate(r.week_start)} — ${fmtDate(r.week_end)}</td>
      <td><strong>${r.driver_name || '—'}</strong></td>
      <td class="mono">${r.truck_unit || '—'}</td>
      <td><span class="badge badge-${r.driver_type}">${typeLabel}</span></td>
      <td class="r mono">$${fmt(r.gross)}</td>
      <td class="r mono" style="color:var(--red)">−$${fmt(r.deductions_total)}</td>
      <td class="r mono green">$${fmt(r.net_pay)}</td>
      <td class="period-cell">${r.loads_count || 0} loads</td>
    </tr>`;
  }).join('');

  document.getElementById('table-body').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Period</th>
          <th>Driver</th>
          <th>Unit</th>
          <th>Type</th>
          <th class="r">Gross</th>
          <th class="r">Deductions</th>
          <th class="r">Net Pay</th>
          <th>Loads</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
}

// Set default date range — last 30 days
const today = new Date();
const d30 = new Date(today); d30.setDate(d30.getDate() - 30);
document.getElementById('f-from').value = d30.toISOString().slice(0,10);
document.getElementById('f-to').value   = today.toISOString().slice(0,10);

loadHistory();
</script>
</body>
</html>
